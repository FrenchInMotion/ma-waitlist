<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingeLang - Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Police moderne et élégante pour un look "Plateforme de streaming" -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #061e1b; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Arrière-plan avec ton illustration */
        .bg-custom-image {
            background-image: url('1 firstframe.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Effet "Verre poli" pour la carte centrale */
        .glass-card {
            background: rgba(11, 39, 35, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Petites particules flottantes pour rajouter de la magie */
        @keyframes float-firefly {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(calc(var(--tx) * 1px), calc(var(--ty) * 1px)) scale(0.5); opacity: 0; }
        }
        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #dcfce7;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px #86efac;
            animation: float-firefly 5s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative bg-custom-image text-white">

    <!-- Voile sombre léger pour assurer la lisibilité -->
    <div class="absolute inset-0 bg-black/40 pointer-events-none"></div>

    <!-- LUCIOLS MAGIQUES -->
    <div class="firefly top-[20%] left-[15%]" style="--tx: 30; --ty: -50; animation-delay: 0s; animation-duration: 6s;"></div>
    <div class="firefly top-[60%] left-[10%]" style="--tx: -20; --ty: -40; animation-delay: 2s; animation-duration: 7s;"></div>
    <div class="firefly top-[30%] right-[20%]" style="--tx: -40; --ty: -60; animation-delay: 1s; animation-duration: 5s;"></div>
    <div class="firefly top-[70%] right-[15%]" style="--tx: 20; --ty: -30; animation-delay: 3s; animation-duration: 8s;"></div>
    <div class="firefly top-[10%] left-[50%]" style="--tx: 50; --ty: -20; animation-delay: 4s; animation-duration: 6s;"></div>

    <!-- CONTENEUR PRINCIPAL -->
    <div class="relative z-10 w-full max-w-xl p-4">
        
        <div class="glass-card rounded-[2.5rem] p-10 md:p-14 text-center relative overflow-hidden">
            
            <div class="absolute top-0 left-1/4 right-1/4 h-px bg-gradient-to-r from-transparent via-emerald-400/50 to-transparent"></div>

            <!-- LOGO -->
            <div class="relative w-32 h-32 mx-auto mb-8 flex items-center justify-center">
                <div class="absolute inset-0 bg-white/10 blur-xl rounded-full scale-125"></div>
                <img src="logo.png" alt="Logo BingeLang" class="relative z-10 w-full h-full object-contain drop-shadow-2xl">
            </div>

            <!-- Textes -->
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-white drop-shadow-lg">
                BingeLang
            </h1>
            
            <h2 class="text-xl md:text-2xl font-semibold text-emerald-300 mb-6 leading-relaxed">
                Don't study French.<br>Binge it.
            </h2>
            
            <p class="text-md text-emerald-50 mb-10 leading-relaxed font-light drop-shadow-md">
                Swap grammar drills for your next favorite show. Immerse yourself in hundreds of captivating videos and acquire French naturally. Join the waitlist for early access.
            </p>

            <!-- Formulaire MailerLite -->
            <form 
                action="https://assets.mailerlite.com/jsonp/2153057/forms/180776335255275113/subscribe" 
                method="post" 
                target="_blank"
                class="flex flex-col gap-5"
            >
                <input type="hidden" name="ml-submit" value="1">
                <input type="hidden" name="anticsrf" value="true">

                <div class="relative">
                    <input
                        type="email"
                        name="fields[email]"
                        placeholder="Your email address..."
                        required
                        class="w-full px-6 py-4 rounded-2xl bg-black/40 border border-emerald-500/30 text-white placeholder-emerald-100/60 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all text-lg font-light backdrop-blur-sm"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-semibold text-xl py-4 px-8 rounded-2xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:shadow-[0_0_30px_rgba(16,185,129,0.5)] border border-emerald-400/50"
                >
                    Get Early Access
                </button>
            </form>

            <p class="text-sm text-emerald-100/70 mt-8 font-light tracking-wide flex items-center justify-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Limited spots available
            </p>
            
        </div>
    </div>

</body>
</html>
